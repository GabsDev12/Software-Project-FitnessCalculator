<!DOCTYPE html>
<html lang="pt-br">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title> Home Page </title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

        <!-- CSS próprio -->
        <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

        {% block head %}
        {% endblock %}

    </head>

    <body>

        <!-- NAVBAR -->
        <nav class="navbar navbar-dark bg-dark">
            <div class="d-flex w-100 align-items-center">
                <!-- Logo à esquerda com espaçamento -->
                <a class="navbar-brand ps-5" href="/">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" 
                        alt="FitnessCalculator Logo" 
                        width="170" 
                        class="d-inline-block align-text-top">
                </a>

                <!-- Links mais para o centro -->
                <ul class="nav ms-auto me-5">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/imc">IMC</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/tmb">TMB</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/macronutrientes">Macronutrientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/agua">Consumo de Água</a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="container mt-5">

        </main>


    <!-- FOOTER -->
    <footer class="footer py-4">
        <div class="container">
            <div class="row align-items-start">
                
                <!-- Coluna 1: Logo -->
                <div class="col-md-3 mb-3 d-flex flex-column align-items-center">
                    <a class="navbar-brand mb-2" href="/">
                        <img src="{{ url_for('static', filename='img/logo.png') }}" 
                            alt="FitnessCalculator Logo" 
                            width="150" 
                            class="d-inline-block align-text-top">
                    </a>
                    <p class="footer-text mb-0 text-center">
                        FitnessCalculator &copy; 2026 <br>
                        Todos os direitos reservados.
                    </p>
                </div>

                <!-- Coluna 2: Links do site -->
                <div class="col-md-3 mb-3">
                    <h6 class="text-white mb-2">Serviços</h6>
                    <ul class="list-unstyled">
                        <li><a class="footer-link" href="/imc">IMC</a></li>
                        <li><a class="footer-link" href="/tmb">TMB</a></li>
                        <li><a class="footer-link" href="/macronutrientes">Macronutrientes</a></li>
                        <li><a class="footer-link" href="/agua">Consumo de Água</a></li>
                    </ul>
                </div>

                <!-- Coluna 3: Legal -->
                <div class="col-md-3 mb-3">
                    <h6 class="text-white mb-2">Legal</h6>
                    <ul class="list-unstyled">
                        <li><a class="footer-link" href="#">Política de Privacidade</a></li>
                        <li><a class="footer-link" href="#">Termos de Uso</a></li>
                    </ul>
                </div>

                <!-- Coluna 4: Redes sociais -->
                <div class="col-md-3 mb-3 d-flex flex-column align-items-center">
                    <h6 class="text-white mb-2">Siga-nos</h6>
                    
                    <div class="d-flex align-items-center">
                        <!-- Ícones -->
                        <a href="https://www.instagram.com" target="_blank" class="text-white mx-1">
                            <i class="bi bi-instagram"></i>
                        </a>
                        <a href="https://www.facebook.com" target="_blank" class="text-white mx-1">
                            <i class="bi bi-facebook"></i>
                        </a>
                        <a href="https://www.tiktok.com" target="_blank" class="text-white mx-1">
                            <i class="bi bi-tiktok"></i>
                        </a>

                        <!-- Texto ao lado -->
                        <span class="footer-text ms-2">@FitnessCalculator</span>
                    </div>
                </div>

            </div>
        </div>
    </footer>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

        <!-- JS próprio -->
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    </body>

</html>
