{% extends "base.html" %}

{% block title %}IMC{% endblock %}

{% block content %}
<h1>Calculadora de IMC</h1>

<form method="POST" class="p-4 bg-white shadow rounded">
    <div class="mb-3">
        <label class="form-label">Nome:</label>
        <input type="text" name="nome" class="form-control" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Peso (kg):</label>
        <input type="number" step="0.1" name="peso" class="form-control" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Altura (m):</label>
        <input type="number" step="0.01" name="altura" class="form-control" required>
    </div>
    
    <button type="submit" class="btn btn-dark">Calcular IMC</button>
</form>

{% if resultado %}
<div class="resultado text-center">
    Seu IMC é: {{ resultado }}
</div>

<br>
{% endif %}
{% endblock %}
